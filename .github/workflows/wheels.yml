name: wheels

on:
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: Publish built artifacts to PyPI
        required: false
        default: "false"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runs-on: ubuntu-24.04
            cibw_archs_linux: x86_64

          - name: linux-aarch64
            runs-on: ubuntu-24.04-arm
            cibw_archs_linux: aarch64

          - name: macos-arm64
            runs-on: macos-15
            cibw_archs_macos: arm64

          - name: macos-x86_64
            runs-on: macos-15-intel
            cibw_archs_macos: x86_64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v3.2.1
        with:
          output-dir: dist
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs_linux }}
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs_macos }}
          CIBW_BEFORE_ALL_LINUX: |
            set -eu
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache zlib-dev bzip2-dev xz-dev
            elif command -v yum >/dev/null 2>&1; then
              yum -y install zlib-devel bzip2-devel xz-devel
            elif command -v dnf >/dev/null 2>&1; then
              dnf -y install zlib-devel bzip2-devel xz-devel
            elif command -v microdnf >/dev/null 2>&1; then
              microdnf -y install zlib-devel bzip2-devel xz-devel
            else
              echo "No supported package manager found" >&2
              exit 1
            fi
          CIBW_TEST_COMMAND: "python -c \"import rocco; import rocco._chain_dp; import rocco._hts_counts\""

      - if: matrix.name == 'linux-x86_64'
        name: Build source distribution
        run: |
          python -m pip install --upgrade build
          mkdir -p dist-sdist
          python -m build --sdist -o dist-sdist
          mv dist-sdist/*.tar.gz dist/

      - name: Upload wheels and sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.name }}
          path: dist/*

  publish:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_pypi == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
